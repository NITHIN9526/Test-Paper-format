<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question Paper Format Editor</title>
    <link rel="stylesheet" href="styles.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

    <!-- ====== EDITOR PANEL ====== -->
    <div class="app-wrapper">

        <!-- Sidebar / Editor -->
        <aside class="editor-panel" id="editorPanel">
            <div class="editor-header">
                <div class="logo">
                    <span class="logo-icon">📄</span>
                    <div>
                        <h1>QP Editor</h1>
                        <p>Question Paper Builder</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn-head-icon" id="resetBtn" title="Reset/Clear All">🧹</button>
                    <button class="btn-head-icon" id="exportBtn" title="Export JSON">📤</button>
                    <button class="btn-head-icon" id="importBtn" title="Import JSON">📥</button>
                    <input type="file" id="importFile" accept=".json" style="display:none" />
                    <button class="toggle-btn" id="togglePanel" title="Toggle Editor">‹</button>
                </div>
            </div>

            <div class="editor-scroll">

                <!-- ── HEADER SECTION ── -->
                <section class="editor-section">
                    <h2 class="section-title"><span class="dot"></span> Paper Header</h2>

                    <div class="field-group">
                        <label>Paper Code (e.g. TED (21)6151 B)</label>
                        <input type="text" id="paperCode" placeholder="TED (21)6151 B" />
                    </div>
                    <div class="field-group">
                        <label>Exam Title (Line 1)</label>
                        <input type="text" id="examTitle1" placeholder="SIXTH SEMESTER DIPLOMA FIRST SERIES" />
                    </div>
                    <div class="field-group">
                        <label>Exam Title (Line 2)</label>
                        <input type="text" id="examTitle2" placeholder="EXAMINATION" />
                    </div>
                    <div class="field-group">
                        <label>Exam Date / Month</label>
                        <input type="text" id="examDate" placeholder="FEBRUARY 2026" />
                    </div>
                    <div class="field-group">
                        <label>Department</label>
                        <input type="text" id="department" placeholder="Department of Computer Hardware Engineering" />
                    </div>
                    <div class="field-group">
                        <label>Subject Name</label>
                        <input type="text" id="subjectName" placeholder="DATA BASE MANAGEMENT SYSTEMS" />
                    </div>
                    <div class="field-row">
                        <div class="field-group">
                            <label>Time</label>
                            <input type="text" id="examTime" placeholder="1 Hour" />
                        </div>
                        <div class="field-group">
                            <label>Max Marks</label>
                            <input type="number" id="maxMarks" placeholder="20" />
                        </div>
                    </div>
                </section>

                <!-- ── PARTS ── -->
                <section class="editor-section" id="partsContainer">
                    <h2 class="section-title"><span class="dot"></span> Exam Parts</h2>
                    <!-- Parts are dynamically generated -->
                </section>

                <button class="add-part-btn" id="addPartBtn">+ Add Part</button>

                <!-- ── FOOTER ── -->
                <section class="editor-section">
                    <h2 class="section-title"><span class="dot"></span> Footer</h2>
                    <div class="field-group">
                        <label>Footer Text</label>
                        <input type="text" id="footerText" value="******* ALL THE BEST *******" />
                    </div>
                </section>

                <!-- ── ACTIONS ── -->
                <div class="action-buttons">
                    <button class="btn-preview" id="previewBtn">👁 Live Preview</button>
                    <button class="btn-download" id="downloadBtn">⬇ Download PDF</button>
                </div>

            </div><!-- /editor-scroll -->
        </aside>

        <!-- ====== PREVIEW PANEL ====== -->
        <main class="preview-panel">
            <div class="preview-toolbar">
                <span class="preview-label">Preview – A4</span>
                <button class="btn-download-top" id="downloadBtnTop">⬇ Download PDF</button>
            </div>

            <div class="preview-viewport">
                <div class="a4-page" id="a4Preview">
                    <!-- Generated by script.js -->
                </div>
            </div>
        </main>

    </div><!-- /app-wrapper -->

    <footer class="app-footer">
        <p>© 2026 QP Editor • Designed & Developed by <a href="https://github.com/NITHIN9526" target="_blank">Nithin</a>
        </p>
    </footer>

    <!-- MathJax 3 for LaTeX equation rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] },
            startup: { typeset: false }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <script src="script.js"></script>
</body>

</html>
